<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="format-detection" content="telephone=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="stylesheet" href="style.css">
    <title>众手杀·六指打字魔</title>
</head>

<body>
    <div class="splash-screen" id="splashScreen">
        <div class="splash-icon">🗳️🦆</div>
        <div class="splash-title">众手杀·多数表决死亡游戏</div>
        <div class="splash-subtitle-en">Mass Hand Kill: Death Game By Majority</div>
        <div class="splash-subtitle">中篇副游戏游艺项目:六指打字魔</div>
        <div class="splash-credits">
            <div class="splash-credit-item"><span>游戏作者</span><span class="splash-credit-value">张卡不雅古</span></div>
            <div class="splash-credit-item"><span>文案</span><span class="splash-credit-value">张卡不雅古</span></div>
            <div class="splash-credit-item"><span>程序</span><span class="splash-credit-value">DeepSeek AI</span></div>
            <div class="splash-credit-item"><span>项目管理员</span><span class="splash-credit-value">张卡不雅古</span></div>
            <div class="splash-credit-item"><span>测试</span><span class="splash-credit-value">张卡不雅古 Nice2Cu
                    Daobert</span></div>
            <div class="splash-credit-item"><span>网页</span><span class="splash-credit-value">Ryan</span></div>
        </div>
        <div class="splash-loader">
            <div class="splash-loader-bar"></div>
        </div>
    </div>

    <div class="app-container">
        <div class="header">
            <div class="header-left">
                <div class="app-title">🦆 六指打字魔</div>
                <span class="partner-tag" id="partnerTag"></span>
                <span class="current-mode-indicator" id="modeIndicator"></span>
                <span class="challenge-banner" id="challengeBanner">⚔️ 挑战中</span>
            </div>
            <div class="header-right"><button class="btn btn-ghost btn-sm" id="btnReset">🔄 重置</button></div>
        </div>
        <div class="main-card">
            <div class="original-section">
                <div class="original-header" id="originalHeader" style="display:none;">
                    <div class="original-label"><span class="dot"></span>原文参考</div>
                    <span style="font-size:0.55rem;color:#6b7280;" id="textInfo"></span>
                </div>
                <div class="original-text" id="originalText"></div>
            </div>
            <div class="input-display-section" id="inputDisplaySection" style="display:none;">
                <div class="input-display-wrapper" id="inputDisplayWrapper">
                    <div class="user-input-display" id="userInputDisplay"></div>
                </div>
            </div>
            <div class="virtual-input-zone" id="virtualInputZone" style="display:none;">
                <div class="tap-area" id="tapArea"><span class="pulse"></span><span id="tapText">点击此处开始打字</span></div>
            </div>
            <div class="hidden-editable" id="hiddenEditable" contenteditable="true" inputmode="text" autocomplete="off"
                autocorrect="off" autocapitalize="off" spellcheck="false"></div>
            <div class="stats-bar" id="statsBar" style="display:none;">
                <div class="stats-left">
                    <span class="stat-item">⏱️<span class="stat-value" id="statTime">00:00</span><span
                            style="color:#ef4444;font-size:0.55rem;" id="timeLimitHint">/60s</span></span>
                    <span class="stat-divider"></span>
                    <span class="stat-item">⚡<span class="stat-value" id="statWPM">0</span>WPM</span>
                    <span class="stat-divider"></span>
                    <span class="stat-item">🎯<span class="stat-value" id="statAccuracy">100</span>%</span>
                    <span class="stat-divider"></span>
                    <span class="stat-item">📝<span class="stat-value" id="statProgress">0/0</span></span>
                </div>
                <div class="stats-dialog-btns" id="statsDialogBtns"></div>
                <button class="btn btn-ghost btn-sm" id="btnResetSmall" style="display:none;">🔄</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="passwordModal" style="display:none;">
        <div class="modal-dialog" id="passwordDialog"></div>
    </div>
    <div class="modal-overlay" id="partnerSelectModal" style="display:none;">
        <div class="modal-dialog" id="partnerSelectDialog"></div>
    </div>
    <div class="modal-overlay" id="partnerConfirmModal" style="display:none;">
        <div class="modal-dialog" id="partnerConfirmDialog"></div>
    </div>
    <div class="modal-overlay" id="resultModal" style="display:none;">
        <div class="modal-dialog" id="resultDialog"></div>
    </div>
    <div class="modal-overlay" id="customTextModal" style="display:none;">
        <div class="modal-dialog" id="customTextDialog"></div>
    </div>
    <div class="modal-overlay" id="specialResultModal" style="display:none;">
        <div class="modal-dialog" id="specialResultDialog"></div>
    </div>
    <div class="modal-overlay" id="confirmBackModal" style="display:none;">
        <div class="modal-dialog" style="text-align:center;">
            <div style="font-size:2rem;">🏠</div>
            <h3>确定返回吗？</h3>
            <p style="color:#9ca3af;margin:4px 0;font-size:0.75rem;">进度将丢失</p>
            <div style="display:flex;gap:6px;justify-content:center;"><button class="btn btn-outline btn-sm"
                    id="btnConfirmCancel">取消</button><button class="btn btn-primary btn-sm"
                    id="btnConfirmBack">确定</button></div>
        </div>
    </div>
    <div class="dialog-overlay" id="dialogOverlay" style="display:none;">
        <div class="dialog-box" id="dialogBox"></div>
    </div>
    <div id="toastContainer"></div>
    <input type="file" id="fileInput" accept=".txt,text/plain" style="display:none;">

    <script src="script.js"></script>
</body>

</html>
